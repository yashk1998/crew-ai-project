    ---

    #### Shot 6 · 30.0–35.0s · Part 2 teaser (final)
    - **Story beat:** Hand off to Part 2. Name what Part 2 will reveal so the viewer needs to come back tomorrow.
    - **Camera:** <e.g. "Close-up on hand sliding cap-table doc out of frame; cut to founder eye-line, full-frontal locked-off shot.">
    - **Scene:** <visual that signals "to be continued" — calendar showing tomorrow's date, "Part 2" lower-third, etc.>
