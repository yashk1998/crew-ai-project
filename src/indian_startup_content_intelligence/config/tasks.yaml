---
collect_indian_startup_content:
  description: |-
    Auto-discover the most trending stories of the last 24-48 hours that matter to **Indian early-stage SaaS/B2B founders (pre-seed → series-A)**, using BOTH the Tavily web search and the ambient RSS feeds.

    **Steps (do all of them in this order):**

    1. **Tavily targeted search — call MULTIPLE times (2-3 calls) with DIFFERENT specific queries.** Generic queries return recap fluff with no named protagonists. Pick 2-3 from this menu of sharper queries:
       - 'site:inc42.com Indian SaaS Series A funding'
       - 'site:entrackr.com Indian B2B SaaS startup funding'
       - 'site:yourstory.com Indian early-stage founder seed'
       - 'site:economictimes.indiatimes.com Indian startup funding this week'
       - 'Razorpay OR Postman OR Zoho OR BharatPe OR Freshworks OR Smallcase OR Atlan OR Chargebee OR Whatfix OR MoEngage OR Yellow.ai funding OR layoffs OR launch'
       - 'Indian B2B SaaS founder Series A this week'
       - 'India venture capital seed round B2B SaaS'
       - 'Peak XV OR Accel India OR Blume OR Lightspeed India OR Stellaris OR Elevation portfolio funding'
       Make multiple calls so the upstream brief generator has named-company stories to work with — not generic "Indian startup ecosystem trending" results.

    2. **RSS ambient sweep:** Call `rss_feed_collector` with no arguments (default Indian startup feeds, 24-hour window). If fewer than 3 items come back, retry with `hours_back=48`. The RSS tool internally validates URLs (drops dead links), so its output is pre-filtered.

    3. **Merge and dedupe:** Combine ALL Tavily call result sets + RSS results. Deduplicate by URL. Drop items missing a title or url.

    4. **Map to RawItems:** title, brief_description (1-2 sentences from the tool snippet, copy verbatim — do NOT rewrite), url (copy character-for-character), source (use the source from the tool output), published (ISO timestamp from tool, or empty string).

    5. **Cap output at 30 items, minimum 3.**

    **Hard rules:**
    - NEVER invent items. Every RawItem must trace to an actual tool result.
    - NEVER modify a URL. Copy URLs exactly. The downstream brief publishes them — a 404 destroys page credibility.
    - If a URL looks malformed (no protocol, no domain), drop the item entirely rather than try to fix it.
    - Do NOT fetch full article bodies.
  expected_output: A RawItemBatch with 3-30 deduplicated items spanning Tavily
    search results and RSS feeds, each with title, 1-2 sentence brief_description,
    a verified working url, source name, and published timestamp (or empty).
  agent: source_scout_agent

classify_and_cluster:
  description: |-
    Analyze each RawItem and organize them into topic clusters, scoring relevance against the locked persona: **Indian early-stage SaaS/B2B founders (pre-seed → series-A)**.

    **For each content item:**
    1. Classify with startup stage, content pillar, india_specific flag, and persona_fit_score (0.0-1.0).
    2. Group semantically similar items into clusters (same event covered by multiple outlets, related sub-topics).
    3. Name each cluster with the most specific, actionable canonical_topic title.

    **Persona-fit scoring guidance:**
    - Genuinely useful for Indian early-stage founders (specific ₹ amounts, named Indian cos, frameworks, contrarian takes): persona_fit_score 0.7-1.0
    - Adjacent (Indian startup news without direct founder takeaway, US content with India relevance): 0.4-0.7
    - Off-pillar or generic ecosystem chatter: 0.0-0.4

    **Classification framework:**
    - Stages: seed, series-a, series-b+, growth, exits, irrelevant
    - Pillars: fundraising, gtm, hiring, product, founder_psych, exits, regulation
    - india_specific: true if the story is India-rooted (Indian co, Indian regulator, Indian VC), false otherwise

    **Output requirements:**
    - Only include clusters with avg persona_fit_score ≥ 0.3
    - Each cluster has 1-5 related items
    - Base classifications ONLY on actual item content — never invent details the source lacks
  expected_output: A TopicClusterBatch covering the persona-relevant content,
    excluding clusters with stage='irrelevant' or avg persona_fit_score < 0.3.

  agent: content_classifier_and_topic_analyzer
  context:
  - collect_indian_startup_content

validate_and_rank:
  description: |-
    Evaluate every TopicCluster using the scoring rubric and return the top 3 clusters most likely to drive Instagram follower growth for **Indian early-stage SaaS/B2B founders**.

    **Scoring criteria (weighted):**
    1. Indian Startup Relevance (30%) — How specific to the Indian startup ecosystem
    2. Actionability (25%) — Can a pre-seed/Series A founder immediately apply this?
    3. Stage Fit (25%) — Relevant for seed/Series A founders specifically
    4. Content Quality (20%) — Substance and credibility of source material

    **Process:**
    1. Score each cluster 1-10 on each criterion
    2. final_score = relevance×0.3 + actionability×0.25 + stage×0.25 + quality×0.2
    3. Apply minimum thresholds: final_score ≥ 6.0 AND avg persona_fit_score ≥ 0.6
    4. Return top 3 ranked by final_score (fewer if fewer pass thresholds)

    **Score breakdown format (must show actual numbers):**
    "relevance=8.0×0.3 + actionability=7.5×0.25 + stage=8.5×0.25 + quality=7.0×0.2 = 7.75"
  expected_output: A RankedTopicBatch with up to 3 topics, ranked by final_score,
    each showing the actual numerical computation in score_breakdown.
  agent: topic_ranking_and_selection_specialist
  context:
  - classify_and_cluster

choose_format:
  description: |-
    Of the 3 ranked topics, assign formats with this MANDATORY mix: **exactly 1 carousel + exactly 2 reels in narrative progression.** No stories, no static.

    **Carousel pick (1 topic):**
    - Identify which one of the 3 topics has the most TACTICAL, framework, multi-step, or step-by-step content. That's your carousel topic.
    - Carousels drive saves; saves drive algorithmic reach. Set expected_primary_metric = "saves".
    - rubric_match must start with "Carousel — " followed by the rubric category that applies.

    **Reel pair (the remaining 2 topics, in narrative progression):**
    - The other two become reels. Order them so a clear arc connects them:
      * **Part 1 (Setup)** — surfaces the tension, names the dilemma, plants the question, ends with explicit Part-2 teaser.
      * **Part 2 (Payoff)** — opens with "Yesterday I asked..." callback, delivers the framework / numbers / contrarian take.
    - The two topics should share a thread (same audience pain, same domain, or same protagonist company). If they don't naturally pair, order them so Part 1 = broader/setup and Part 2 = sharper/payoff.
    - Both reels: expected_primary_metric = "watch_time".
    - rubric_match for the two reels must be exactly "Reel — Part 1 (Setup)" and exactly "Reel — Part 2 (Payoff)".
    - The `reasoning` field for each reel MUST state the narrative bridge: "Part 1 raises X; Part 2 answers it with Y."

    **Rubric for the carousel (cite which one applies in rubric_match):**
    - Tactical content (frameworks, checklists, playbooks)
    - Tutorial / how-to with visual density
    - Multi-step decision framework
    - Detailed breakdown of an Indian co's strategy

    **HARD RULES:**
    1. Output exactly 3 FormatRecommendations: 1 with format="carousel", 2 with format="reel".
    2. expected_primary_metric: carousel→"saves", reel→"watch_time" (both reels).
    3. rubric_match strings must follow the patterns above ("Carousel — <category>", "Reel — Part 1 (Setup)", "Reel — Part 2 (Payoff)") — the brief generator reads these to know which reel is which.
    4. Reasoning for the reels must explicitly bridge Part 1 → Part 2.
  expected_output: A FormatRecommendationBatch with exactly 3 recommendations —
    one carousel (saves) and two reels in narrative progression (watch_time), each
    citing its rubric match and the reels naming their narrative bridge.
  agent: instagram_content_format_specialist_for_b2b_founder_audiences
  context:
  - validate_and_rank

generate_carousel_brief:
  description: |-
    Produce **ONE Instagram CAROUSEL brief** for Indian early-stage SaaS/B2B founders. Pick the topic from the upstream `choose_format` task whose `format == "carousel"`. Apply ALL rules from the agent backstory (voice, North Star, substance floor, forbidden patterns, fallback roster).

    **Source-grounding rule:** Every URL you cite MUST come from the upstream RankedTopic.items list — copy character-for-character. NEVER use example.com, NEVER invent placeholder URLs, NEVER use "[Startup 1]" / "<Company>" / "Company X". If upstream cluster URLs are thin: omit the Sources section URLs, mark fact_check = "Evergreen", and use ≥ 3 REAL Indian company names from the FALLBACK COMPANY ROSTER in the agent backstory (Razorpay, Postman, Zoho, BharatPe, Atlan, Whatfix, MoEngage, Chargebee, Yellow.ai, Smallcase, Cred, Slice, Innovaccer, Khatabook, OfBusiness, Apna, Spinny, etc.).

    **Output the brief using EXACTLY this markdown template (output ONLY this single brief block — no preamble, no postamble):**

    ```
    ## Brief #1: <topic line>

    > **Thesis:** <one sharp sentence on why this content exists>

    **Audience:** <specific subaudience, e.g. "Pre-seed B2B SaaS founders negotiating their first cap table">
    **Why now:** <what makes this timely THIS WEEK; cite the source date>
    **Format:** Carousel
    **Specs:** 8-10 slides | 4:5 | Slide 1 hook | 5-7 hashtags
    **Fact-check:** <Verified | Evergreen | Unverified> — <one-sentence note>

    ### Sources
    - [<title>](<real upstream url>) — <source name>
    - [<title>](<real upstream url>) — <source name>

    ### Hooks
    **A · Specific number / loss-aversion** — <hook text, ≤15 words>
      _Why it works: <1 sentence tagged to "saves">_
    **B · Contrarian-but-defensible** — <hook text>
      _Why it works: <1 sentence>_
    **C · Insider language / pattern recognition** — <hook text>
      _Why it works: <1 sentence>_

    ### Slide Blueprint
    | # | Slide | Visual + Design | Headline | Voiceover | Transition |
    |---|---|---|---|---|---|
    | 1 | Slide 1 | <visual concept; design: hex colors, typography, layout grid, motion> | <≤8 words> | (empty) | N/A |
    | 2 | Slide 2 | <visual> | <headline> | (empty) | N/A |
    | 3 | Slide 3 | <visual> | <headline> | (empty) | N/A |
    | 4 | Slide 4 | <visual> | <headline> | (empty) | N/A |
    | 5 | Slide 5 | <visual> | <headline> | (empty) | N/A |
    | 6 | Slide 6 | <visual> | <headline> | (empty) | N/A |
    | 7 | Slide 7 | <visual> | <headline> | (empty) | N/A |
    | 8 | Slide 8 | <visual> | <headline> | (empty) | N/A |
    | 9 | Slide 9 | <visual> | <headline summary + Follow CTA> | (empty) | N/A |

    Slide 1 = hook. Slide 2 = stakes / why this matters. Slides 3-8 = framework, one step per slide, each with a real named Indian company example. Final slide = summary + Follow CTA. Voiceover column empty.

    ### Production Handoff

    **Producer's next 4 actions (do today, in order — name an owner + deadline for each):**
    1. <action + owner + deadline, e.g. "Designer: lock Figma template + brand kit by 5 PM IST today">
    2. <action + owner + deadline>
    3. <action + owner + deadline>
    4. <action + owner + deadline>

    **Pre-production checklist (T-24h before publish):**
    - **Figma file:** <project + frame template, e.g. "IG-Carousel-4x5-9slides — Frames 1–9">
    - **Brand kit:** <hex palette (3 colours) + typography weights, e.g. "Ink #0A0A0A / Bone #F5F1E8 / Accent #FF5A1F · Inter Display 800 (headlines) + Inter SemiBold (body)">
    - **Source assets (numbered, with where to source each):** 1) <e.g. "Founder portrait — internal Drive / brand-photos">  2) <e.g. "Razorpay dashboard screenshot — official press kit">  3) <e.g. "Stat card data — pull from Inc42 funding tracker">
    - **Stat sheet:** Build ONE doc with every number, company name, founder name, and source URL the slides will reference. Designer pulls from this; nothing gets typed twice.

    **Build kit:**
    - **Tool:** Figma (Canva Pro as fallback)
    - **Frame size:** 1080×1350 (4:5) · 12-column grid · 24px gutter · 64px outer margin
    - **Type system:** Headline 72pt / 1.1 line-height · Body 36pt / 1.4 · Caption 24pt / 1.3 (adjust to your kit)
    - **Plugins:** Iconify for icons · Unsplash plugin for stock if needed

    **Build day flow (3 hours total):**
    - 0–30 min: Wireframe all 9 slides on a single Figma page (greybox layout, no design polish)
    - 30–120 min: Visual design pass — apply colours, typography, imagery, lower-thirds
    - 120–150 min: Founder review on Figma share link, capture feedback inline
    - 150–180 min: Revisions + export

    **Post-build checklist (do in this order):**
    1. Export PNG sequence at 1080×1350, sRGB, named `slide-01.png` through `slide-09.png`
    2. Build a 5s MP4 walkthrough mock (15fps, 1080×1350) so the founder previews the full carousel as one piece
    3. Cover image: crop slide 1 to 1080×1080 for the feed grid preview
    4. Alt-text file: 1 plain-English sentence per slide for accessibility (saved as `alt.txt`)
    5. Quality gate: every slide opened on a 6.1" phone preview before sign-off — confirm headline readable in 1.5s, no body text smaller than 28pt

    **Deliverables (drop all in `/<topic-slug>/carousel/` shared folder):**
    - 8–10 PNG slides (1080×1350)
    - 1 MP4 walkthrough mock (5s)
    - 1 cover image (1080×1080)
    - 1 alt-text file
    - Figma source link (read-only)

    **Approval gate:**
    - Founder reviews wireframe at T-24h (10-min call max)
    - Founder signs off final exports T-2h before scheduled post
    - If founder unreachable T-2h: designer publishes the locked v2 (no further edits)

    ### Captions (3 drafts)

    **Long (140-180 words):**
    > <story-led primary caption with line breaks every 1-2 sentences; first line survives Instagram's "Read More" cut at ~125 chars>

    **Medium (60-90 words):**
    > <punchier, framework-led; no story setup>

    **Short (≤30 words):**
    > <pure hook + CTA>

    ### Hashtags (tiered, 5-7 total, no #)
    - **Broad (1-2):** <e.g. IndianStartups, SaaS>
    - **Niche (2-3):** <e.g. IndianSaaS, B2BSaaSIndia, BangaloreFounders>
    - **Community / branded (1):** <branded tag or FoundersOfIndia>
    - **Trend (0-1):** <only if a trending tag legitimately matches; else omit>

    ### CTAs
    - **Primary:** Save — <specific reason, e.g. "Save for your next investor deck.">
    - **Comment-driver:** <specific question, e.g. "Which mistake have you made? 1, 2, or 3?">
    - **DM-trigger:** <e.g. "DM 'CAP' for the cap-table template">
    - **Follow:** Follow for daily breakdowns of Indian early-stage playbooks.

    ### Audio
    No audio (silent IG carousel). For Story-tease repurposing: <real trending audio name + BPM + mood>.

    ### Posting Strategy
    - **Day + time (IST):** <e.g. Tue 9:00 AM IST — founders pre-stand-up>
    - **Cross-promo:** <Story tease 2-4 hours before; what the tease shows>
    - **Sequencing:** Standalone carousel.

    ### Engagement Playbook (first 60 minutes)
    - **Pinned comment (verbatim, ≤200 chars):** <framework summary + DM trigger>
    - **Prepared reply lines (3):**
      1. Agreement amplifier — <line>
      2. Gentle disagreement — <line>
      3. Follow-up question — <line>
    - **Outbound engagement (3 named accounts):** <e.g. @nithin0dha, @sajithpai, @aviralbhat>
    - **Story amplifier (30 min after feed post):** <slide concept + poll/question sticker>
    - **Follow-up post idea (tomorrow's queue):** <the natural next post extending this topic>

    ---
    ```

    **HARD RULES:**
    - Output exactly ONE brief block, the carousel.
    - ≥ 8 slide rows in the table. Every slide a distinct insight.
    - All 3 caption drafts complete (long 140-180w, medium 60-90w, short ≤30w).
    - ≥ 3 named Indian companies, ≥ 2 specific ₹ amounts or percentages, ≥ 1 named framework / playbook / role per brief.
    - All 5 engagement-playbook components filled with specifics.
    - All 3 hooks + all 4 CTAs filled.
    - **Production Handoff section is mandatory and complete:** Producer's 4 next actions each have an OWNER + DEADLINE; all 7 sub-blocks (next-actions, pre-prod, build kit, build day flow, post-build checklist, deliverables, approval gate) filled with concrete specifics — no "TBD", no generic "design well".
    - Zero example.com, zero placeholder names, zero motivational filler.
    - Every line passes the like-save-share test, or it gets cut.
    - Output is the markdown brief content directly — no preamble, no postamble, no JSON, no code fence wrapping the whole output.
  expected_output: |-
    A single markdown brief block (heading "## Brief #1:") for the carousel topic, ending with "---". Contains: header strip, sources, 3 hooks with reasoning, slide blueprint table with ≥8 rows, a complete Production Handoff section (Producer's 4 next actions with owner+deadline, pre-production checklist, build kit, build day flow, post-build checklist, deliverables, approval gate — every sub-block concrete), three caption drafts (long/medium/short), tiered hashtags, 4-CTA stack, audio, posting strategy, and a 5-part engagement playbook. ≥ 3 named Indian companies, ≥ 2 specific numbers, ≥ 1 named framework. Zero example.com, zero placeholders.
  agent: senior_creative_director_for_instagram_b2b_content___schema_compliant
  context:
  - validate_and_rank
  - choose_format

generate_reel_part1_brief:
  description: |-
    Produce **ONE Instagram REEL brief — Part 1 (Setup)** for Indian early-stage SaaS/B2B founders. Pick the topic from the upstream `choose_format` task whose `rubric_match == "Reel — Part 1 (Setup)"`. Apply ALL rules from the agent backstory (voice, North Star, substance floor, forbidden patterns, fallback roster).

    **Source-grounding rule:** Every URL you cite MUST come from the upstream RankedTopic.items list — copy character-for-character. NEVER use example.com, NEVER invent placeholder URLs. If upstream cluster URLs are thin: omit Sources URLs, mark fact_check = "Evergreen", and use ≥ 3 REAL Indian company names from the FALLBACK COMPANY ROSTER.

    **Part 1 narrative role:** SETUP. Surface the tension, name the dilemma, plant the question. End the final shot with an explicit teaser for Part 2 ("Tomorrow: the 3 numbers that decide it.").

    **Story Blueprint design philosophy:** This is the centerpiece of the brief. A non-technical founder must be able to read it and visualise the reel cut by cut without asking a question. Every shot gets its own block with eight labelled fields — story beat, camera, scene, design, sticker, voiceover, emotion, transition. Specific named props, real Indian B-roll references, hex colours, lens choices, frame counts. NO single-sentence shots.

    **Output the brief using EXACTLY this markdown template (output ONLY this single brief block — no preamble, no postamble):**

    ```
    ## Brief #2: <topic line>

    > **Thesis:** <one sharp sentence on why this content exists, framed as Part 1 of a 2-reel arc>

    **Audience:** <specific subaudience> · **Why now:** <what makes this timely THIS WEEK; cite source date>
    **Format:** Reel — Part 1 (Setup) · **Specs:** 6 shots × 30–45s · 9:16 · Hook in first 1.5s · Final shot = Part 2 teaser
    **Fact-check:** <Verified | Evergreen | Unverified> — <one-line note>

    ### Sources
    - [<title>](<real upstream url>) — <source name>

    ### Hooks (3 angles)
    - **A · Specific number / loss-aversion** — "<hook text, ≤15 words>" _(why it works: <1 sentence on watch_time>)_
    - **B · Contrarian-but-defensible** — "<hook text>" _(why: <1 sentence>)_
    - **C · Insider language / pattern recognition** — "<hook text>" _(why: <1 sentence>)_

    ### Story Blueprint

    **Dramatic arc (3 lines):**
    1. <opening beat — what tension surfaces in the first 4 seconds>
    2. <middle escalation — how the stakes raise>
    3. <closing beat — the unresolved question that hands off to Part 2>

    **Runtime:** 32–40s across 6 shots · Pacing: 4–7s cuts, tightest around the reveal · Aspect: 9:16 vertical · Captions burned-in (97% watch with sound off in IST mornings).

    ---

    #### Shot 1 · 0.0–4.0s · Hook (Pattern interrupt)
    - **Story beat:** <1 line: what this shot does narratively — e.g. "Name the founder's hidden anxiety in the first 2 seconds so the algorithm holds the watch.">
    - **Camera:** <lens · framing · angle · height · light direction — e.g. "35mm equivalent, tight close-up, slight Dutch angle for unease, phone at chest height, soft window light from camera-right.">
    - **Scene:** <2–3 lines of literal visual content — wardrobe, props, location, B-roll cut-ins. Name real assets if relevant. e.g. "Founder in plain crew-neck tee, mid-30s, seated in coworking space (BHIVE Bengaluru aesthetic). Cut-in B-roll: Slack screenshot showing investor reply 'Let's revisit in Q3', overlaid with timestamp.">
    - **Design:** <hex colours · typography · sticker motion · grain — e.g. "Ink #0A0A0A on bone #F5F1E8. Inter Display 800 for sticker, SemiBold for body. Sticker snap-in 12-frame ease-out. 8% film grain.">
    - **Sticker (≤6 words):** "<sticker text>"
    - **Voiceover (1–3 sentences, MUST differ from sticker):** "<conversational founder-to-founder voice; specific not generic; ends pulling into shot 2>"
    - **Emotion:** <Tension | Curiosity | Confrontation | Confidence | Calm>
    - **Transition out:** <e.g. "Whip-pan right, 6-frame motion blur" or "Match-cut on phone screen" or "Hard cut">

    ---

    #### Shot 2 · 4.0–9.0s · Stakes
    - **Story beat:** <...>
    - **Camera:** <...>
    - **Scene:** <...>
    - **Design:** <...>
    - **Sticker (≤6 words):** "<...>"
    - **Voiceover (1–3 sentences, ≠ sticker):** "<...>"
    - **Emotion:** <...>
    - **Transition out:** <...>

    ---

    #### Shot 3 · 9.0–15.0s · Tension build
    - **Story beat:** <...>
    - **Camera:** <...>
    - **Scene:** <...>
    - **Design:** <...>
    - **Sticker (≤6 words):** "<...>"
    - **Voiceover (1–3 sentences, ≠ sticker):** "<...>"
    - **Emotion:** <...>
    - **Transition out:** <...>

    ---

    #### Shot 4 · 15.0–22.0s · The dilemma
    - **Story beat:** <...>
    - **Camera:** <...>
    - **Scene:** <...>
    - **Design:** <...>
    - **Sticker (≤6 words):** "<...>"
    - **Voiceover (1–3 sentences, ≠ sticker):** "<...>"
    - **Emotion:** <...>
    - **Transition out:** <...>

    ---

    #### Shot 5 · 22.0–30.0s · Cliffhanger
    - **Story beat:** <...>
