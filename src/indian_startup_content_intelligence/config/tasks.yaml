    - **Outbound engagement (3 accounts):** <e.g. @nithin0dha, @sajithpai, @aviralbhat — comment with substance, not "🔥">
    - **Story amplifier (T+30min):** <slide concept + poll/question sticker>
    - **Tomorrow's queue:** Reel Part 2 (Payoff)

