    - **Comment-driver:** <specific question that splits the audience, e.g. "Bootstrap or raise? Drop your pick.">
    - **DM-trigger:** <e.g. "DM 'PART2' for the early notification">
    - **Follow:** Follow so Part 2 hits your feed tomorrow.

