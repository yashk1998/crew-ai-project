    **Voiceover discipline:** Every voiceover line MUST DIFFER from its on-screen sticker. The sticker is ≤6 words; the voiceover is 1-3 conversational sentences. Each voiceover ends with a tease pulling to the next shot. Final shot's voiceover EXPLICITLY previews Part 2.

