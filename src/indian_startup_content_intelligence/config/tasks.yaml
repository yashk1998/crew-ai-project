---
collect_indian_startup_content:
  description: |-
    Auto-discover the most trending stories of the last 24-48 hours that matter to **Indian early-stage SaaS/B2B founders (pre-seed → series-A)**, using BOTH the Tavily web search and the ambient RSS feeds.

    **Steps (do all of them in this order):**

    1. **Tavily targeted search — call 3 times with DIFFERENT queries chosen for FRESHNESS + DIVERSITY of names.** The downstream brief generator must NOT recycle the same Razorpay / Zoho / BharatPe / Cred every week. Bias your queries toward fresh, less-covered companies. Pick 3 from this menu:

       *Site-scoped current-week funding (best for fresh names):*
       - 'site:inc42.com Indian SaaS Series A funding'
       - 'site:entrackr.com Indian B2B SaaS startup seed funding'
       - 'site:yourstory.com Indian early-stage founder seed Series A'
       - 'site:moneycontrol.com Indian startup funding raise'
       - 'site:thehindubusinessline.com Indian SaaS startup funding'

       *Fresh-names searches (deliberately exclude the famous-5):*
       - 'Indian B2B SaaS startup funding this week -Razorpay -Zoho -Freshworks -BharatPe'
       - 'Indian seed-stage SaaS launch this week -Razorpay -Cred -Postman'
       - 'Indian vertical SaaS Series A 2024 OR 2025 funding'
       - 'Indian AI startup funding seed OR Series A -OpenAI'
       - 'Setu OR M2P OR Decentro OR Hasura OR Capillary OR Rupifi OR Niro OR Plivo OR Vymo OR GoKwik OR Easebuzz OR Shiprocket OR Hyperverge OR Mantra OR BimaPe OR Sarvam OR Krutrim funding OR launch'

       *VC portfolio / investor-led:*
       - 'Peak XV OR Accel India OR Blume OR Lightspeed India OR Stellaris OR Elevation OR Z47 OR Bessemer India portfolio funding announcement'
       - 'Together Fund OR Beenext OR Nexus India OR Kalaari OR Chiratae portfolio early-stage'

       Choose at LEAST one site-scoped query and at LEAST one fresh-names query. Avoid the famous-name OR query unless your other queries returned 0 fresh names.

    2. **RSS ambient sweep:** Call `rss_feed_collector` with no arguments (default Indian startup feeds, 24-hour window). If fewer than 3 items come back, retry with `hours_back=48`. The RSS tool internally validates URLs (drops dead links), so its output is pre-filtered.

    3. **Merge and dedupe:** Combine ALL Tavily call result sets + RSS results. Deduplicate by URL. Drop items missing a title or url.

    4. **Map to RawItems:** title, brief_description (1-2 sentences from the tool snippet, copy verbatim — do NOT rewrite), url (copy character-for-character), source (use the source from the tool output), published (ISO timestamp from tool, or empty string).

    5. **Cap output at 30 items, minimum 3.**

    **Hard rules:**
    - NEVER invent items. Every RawItem must trace to an actual tool result.
    - NEVER modify a URL. Copy URLs exactly. The downstream brief publishes them — a 404 destroys page credibility.
    - If a URL looks malformed (no protocol, no domain), drop the item entirely rather than try to fix it.
    - Do NOT fetch full article bodies.
  expected_output: A RawItemBatch with 3-30 deduplicated items spanning Tavily
    search results and RSS feeds, each with title, 1-2 sentence brief_description,
    a verified working url, source name, and published timestamp (or empty).
  agent: source_scout_agent

classify_and_cluster:
  description: |-
    Analyze each RawItem and organize them into topic clusters, scoring relevance against the locked persona: **Indian early-stage SaaS/B2B founders (pre-seed → series-A)**.

    **For each content item:**
    1. Classify with startup stage, content pillar, india_specific flag, and persona_fit_score (0.0-1.0).
    2. Group semantically similar items into clusters (same event covered by multiple outlets, related sub-topics).
    3. Name each cluster with the most specific, actionable canonical_topic title.

    **Persona-fit scoring guidance:**
    - Genuinely useful for Indian early-stage founders (specific ₹ amounts, named Indian cos, frameworks, contrarian takes): persona_fit_score 0.7-1.0
    - Adjacent (Indian startup news without direct founder takeaway, US content with India relevance): 0.4-0.7
    - Off-pillar or generic ecosystem chatter: 0.0-0.4

    **Classification framework:**
    - Stages: seed, series-a, series-b+, growth, exits, irrelevant
    - Pillars: fundraising, gtm, hiring, product, founder_psych, exits, regulation
    - india_specific: true if the story is India-rooted (Indian co, Indian regulator, Indian VC), false otherwise

    **Output requirements:**
    - Only include clusters with avg persona_fit_score ≥ 0.3
    - Each cluster has 1-5 related items
    - Base classifications ONLY on actual item content — never invent details the source lacks
  expected_output: A TopicClusterBatch covering the persona-relevant content,
    excluding clusters with stage='irrelevant' or avg persona_fit_score < 0.3.

  agent: content_classifier_and_topic_analyzer
  context:
  - collect_indian_startup_content

validate_and_rank:
  description: |-
    Evaluate every TopicCluster using the scoring rubric and return the top 3 clusters most likely to drive Instagram follower growth for **Indian early-stage SaaS/B2B founders**.

    **Scoring criteria (weighted):**
    1. Indian Startup Relevance (30%) — How specific to the Indian startup ecosystem
    2. Actionability (25%) — Can a pre-seed/Series A founder immediately apply this?
    3. Stage Fit (25%) — Relevant for seed/Series A founders specifically
    4. Content Quality (20%) — Substance and credibility of source material

    **Process:**
    1. Score each cluster 1-10 on each criterion
    2. final_score = relevance×0.3 + actionability×0.25 + stage×0.25 + quality×0.2
    3. Apply minimum thresholds: final_score ≥ 6.0 AND avg persona_fit_score ≥ 0.6
    4. Return top 3 ranked by final_score (fewer if fewer pass thresholds)

    **Score breakdown format (must show actual numbers):**
    "relevance=8.0×0.3 + actionability=7.5×0.25 + stage=8.5×0.25 + quality=7.0×0.2 = 7.75"
  expected_output: A RankedTopicBatch with up to 3 topics, ranked by final_score,
    each showing the actual numerical computation in score_breakdown.
  agent: topic_ranking_and_selection_specialist
  context:
  - classify_and_cluster

choose_format:
  description: |-
    Of the 3 ranked topics, assign formats with this MANDATORY mix: **exactly 1 carousel + exactly 2 reels in narrative progression.** No stories, no static.

    **Carousel pick (1 topic):**
    - Identify which one of the 3 topics has the most TACTICAL, framework, multi-step, or step-by-step content. That's your carousel topic.
    - Carousels drive saves; saves drive algorithmic reach. Set expected_primary_metric = "saves".
    - rubric_match must start with "Carousel — " followed by the rubric category that applies.

    **Reel pair (the remaining 2 topics, in narrative progression):**
    - The other two become reels. Order them so a clear arc connects them:
      * **Part 1 (Setup)** — surfaces the tension, names the dilemma, plants the question, ends with explicit Part-2 teaser.
      * **Part 2 (Payoff)** — opens with "Yesterday I asked..." callback, delivers the framework / numbers / contrarian take.
    - The two topics should share a thread (same audience pain, same domain, or same protagonist company). If they don't naturally pair, order them so Part 1 = broader/setup and Part 2 = sharper/payoff.
    - Both reels: expected_primary_metric = "watch_time".
    - rubric_match for the two reels must be exactly "Reel — Part 1 (Setup)" and exactly "Reel — Part 2 (Payoff)".
    - The `reasoning` field for each reel MUST state the narrative bridge: "Part 1 raises X; Part 2 answers it with Y."

    **Rubric for the carousel (cite which one applies in rubric_match):**
    - Tactical content (frameworks, checklists, playbooks)
    - Tutorial / how-to with visual density
    - Multi-step decision framework
    - Detailed breakdown of an Indian co's strategy

    **HARD RULES:**
    1. Output exactly 3 FormatRecommendations: 1 with format="carousel", 2 with format="reel".
    2. expected_primary_metric: carousel→"saves", reel→"watch_time" (both reels).
    3. rubric_match strings must follow the patterns above ("Carousel — <category>", "Reel — Part 1 (Setup)", "Reel — Part 2 (Payoff)") — the brief generator reads these to know which reel is which.
    4. Reasoning for the reels must explicitly bridge Part 1 → Part 2.
  expected_output: A FormatRecommendationBatch with exactly 3 recommendations —
    one carousel (saves) and two reels in narrative progression (watch_time), each
    citing its rubric match and the reels naming their narrative bridge.
  agent: instagram_content_format_specialist_for_b2b_founder_audiences
  context:
  - validate_and_rank

generate_carousel_brief:
  description: |-
    Produce **ONE Instagram CAROUSEL brief** for Indian early-stage SaaS/B2B founders. Pick the topic from the upstream `choose_format` task whose `format == "carousel"`. Apply ALL rules from the agent backstory (Editorial Frame, Concept Menu, Voice Principles, Substance Floor, Multi-company Diversity, Forbidden Patterns).

    **EDITORIAL FRAME (read first):** This brief is CONCEPT-LED, not COMPANY-LED. The thesis names a STARTUP CONCEPT from the Concept Menu (capital efficiency, default-alive runway, founder-led GTM, ESOP economics, second-product timing, etc.) — not a company's playbook. The concept is illustrated by ≥ 3 DIFFERENT Indian companies' approaches. NO single company carries more than 40% of the slides.

    **FRESH > FAMOUS:** Look at the upstream RankedTopic.items. Are there company names there that aren't Razorpay / Zoho / BharatPe / Cred / Freshworks? Use THOSE first. If the cluster has Setu, M2P, Hasura, Capillary, Sarvam, Plivo, Rupifi, Vymo, Niro, GoKwik, etc. — they are the protagonists. The famous-5 only appear if they're directly in the cluster AND the concept genuinely needs them.

    **URL DISCIPLINE — read twice:**
    - Cite ONLY URLs that appear character-for-character in the upstream `RankedTopic.items[*].url` field. Copy them verbatim.
    - NEVER invent URLs. NEVER reconstruct from memory. NEVER substitute a company homepage for an article URL. NEVER use example.com.
    - If you cannot find a URL in the upstream context: OMIT the Sources block, mark fact_check = "Evergreen". A brief with NO sources beats a brief with broken 404 sources.

    **Output the brief using EXACTLY this markdown template (output ONLY this single brief block — no preamble, no postamble):**

    ```
    ## Brief #1: <Concept name — what [Co1], [Co2], [Co3] reveal>

    > **Concept being taught:** <named concept from the Concept Menu, e.g. "Capital efficiency at Series D" / "The fire-your-first-sales-hire stage gate" / "Equal co-founder splits as Series-A killer">
    > **Thesis:** <one sharp sentence stating the non-obvious lesson the founder will walk away with — NOT what a company did, but what the pattern across companies reveals>
    > **Companies illustrated (3+, each must be different):** <Co1 · Co2 · Co3 [· Co4]> — prefer fresh Tavily-surfaced names over famous-5 autopilot.

    **Audience:** <specific subaudience, e.g. "Pre-seed B2B SaaS founders negotiating their first cap table">
    **Why now:** <what makes this timely THIS WEEK; cite the source date>
    **Format:** Carousel
    **Specs:** 8-10 slides | 4:5 | Slide 1 hook | 5-7 hashtags
    **Fact-check:** <Verified | Evergreen | Unverified> — <one-sentence note>

    ### Sources
    - [<title>](<real upstream url>) — <source name>
    - [<title>](<real upstream url>) — <source name>

    ### Hooks
    **A · Specific number / loss-aversion** — <hook text, ≤15 words>
      _Why it works: <1 sentence tagged to "saves">_
    **B · Contrarian-but-defensible** — <hook text>
      _Why it works: <1 sentence>_
    **C · Insider language / pattern recognition** — <hook text>
      _Why it works: <1 sentence>_

    ### Slide Blueprint

    **Slide arc (3 lines — name the carousel's narrative shape):**
    1. <opening: hook + stakes that earn the swipe>
    2. <middle: step-by-step framework, one step per slide, each anchored to a named Indian company>
    3. <closing: recap + Follow / Save CTA>

    **Specs:** 9 slides · 1080×1350 (4:5) · 12-column grid, 24px gutter, 64px outer margin · Inter Display 800 headlines / Inter SemiBold body · burned-in text (no audio).

    ---

    #### Slide 1 · Hook (earn the swipe)
    - **Visual concept:** <2–3 sentences of literal visual content — what's on screen, layout, named real Indian specifics. e.g. "Razorpay logo top-left, ₹800 Cr Series D grabber headline centered, soft Razorpay-blue gradient backdrop, swipe-right arrow bottom-right.">
    - **Design:** <hex palette (e.g. "Razorpay blue #095DCE on bone #F5F1E8 with accent #FF5A1F") · typography (Inter Display 800, 72pt / 1.1 line-height) · layout (centered, generous negative space)>
    - **Headline (≤8 words):** "<text>"
    - **Sub / body text (optional, ≤20 words):** "<supporting line — number + name>"
    - **Source credit:** <e.g. "Data: Inc42 funding tracker, 2024">

    ---

    #### Slide 2 · Stakes (why this matters NOW)
    - **Visual concept:** <...>
    - **Design:** <...>
    - **Headline (≤8 words):** "<...>"
    - **Sub / body text:** "<...>"
    - **Source credit:** <...>

    ---

    #### Slide 3 · Lesson 1 — Co1's approach (non-obvious second-order insight)
    - **Visual concept:** <name Co1 — a different company than Slides 4 and 5 — and show its approach to the concept; lower-third stat card with the relevant number>
    - **Design:** <hex · type · layout>
    - **Headline (≤8 words):** "<the LESSON, not the company name>"
    - **Sub / body text:** "<the non-obvious takeaway: e.g. what their approach REVEALS about the concept, not just what they did>"
    - **Source credit:** <...>

    ---

    #### Slide 4 · Lesson 2 — Co2's contrasting approach
    - **Visual concept:** <name Co2 — DIFFERENT from Slide 3 and Slide 5 — show their contrasting approach to the same concept>
    - **Design:** <...>
    - **Headline (≤8 words):** "<the lesson>"
    - **Sub / body text:** "<the contrast — what their path teaches that Co1's didn't>"
    - **Source credit:** <...>

    ---

    #### Slide 5 · Lesson 3 — Co3's edge case (the uncanny one)
    - **Visual concept:** <name Co3 — DIFFERENT from Slides 3 and 4 — show the edge case or exception that breaks the obvious pattern>
    - **Design:** <...>
    - **Headline (≤8 words):** "<the edge-case lesson>"
    - **Sub / body text:** "<why this exception MATTERS for founders applying the concept>"
    - **Source credit:** <...>

    ---

    #### Slide 6 · The pattern (synthesise across the 3 companies)
    - **Visual concept:** <2x2 or 3-column comparison summarising what Co1/Co2/Co3 share AND differ on; this is the synthesis slide>
    - **Design:** <...>
    - **Headline (≤8 words):** "<the synthesis statement>"
    - **Sub / body text:** "<the third-order observation: what the pattern across all 3 signals about the ecosystem>"
    - **Source credit:** <...>

    ---

    #### Slide 7 · The contrarian read (what most founders WILL conclude vs what they SHOULD)
    - **Visual concept:** <this is the screenshot-able, save-able slide; design for clarity; could be a 2-column "What you think / What's actually true">
    - **Design:** <...>
    - **Headline (≤8 words):** "<the contrarian framing>"
    - **Sub / body text:** "<the screen-shottable insight that survives independent of the post>"
    - **Source credit:** <...>

    ---

    #### Slide 8 · Recap (3-beat framework summary)
    - **Visual concept:** <stack the 3 most-important steps as a one-glance summary card so the slide is screenshot-able on its own>
    - **Design:** <...>
    - **Headline (≤8 words):** "<the framework name + word "playbook" / "blueprint">"
    - **Sub / body text:** "<3-line summary of the steps>"
    - **Source credit:** <optional>

    ---

    #### Slide 9 · CTA (Follow + Save + DM trigger)
    - **Visual concept:** <large founder face crop OR brand mark; CTA copy dominates the frame>
    - **Design:** <high-contrast accent for the CTA word; arrow / hand pointer toward profile pic top-left>
    - **Headline (≤8 words):** "Save · Follow · DM '<TRIGGER>'"
    - **Sub / body text:** "<one-line invite, e.g. 'Daily Indian SaaS playbooks. Follow @<handle>.'>"
    - **Source credit:** <not applicable>

    ---

    ### Production Handoff

    **Producer's next 4 actions (do today, in order — name an owner + deadline for each):**
    1. <action + owner + deadline, e.g. "Designer: lock Figma template + brand kit by 5 PM IST today">
    2. <action + owner + deadline>
    3. <action + owner + deadline>
    4. <action + owner + deadline>

    **Pre-production checklist (T-24h before publish):**
    - **Figma file:** <project + frame template, e.g. "IG-Carousel-4x5-9slides — Frames 1–9">
    - **Brand kit:** <hex palette (3 colours) + typography weights, e.g. "Ink #0A0A0A / Bone #F5F1E8 / Accent #FF5A1F · Inter Display 800 (headlines) + Inter SemiBold (body)">
    - **Source assets (numbered, with where to source each):** 1) <e.g. "Founder portrait — internal Drive / brand-photos">  2) <e.g. "Razorpay dashboard screenshot — official press kit">  3) <e.g. "Stat card data — pull from Inc42 funding tracker">
    - **Stat sheet:** Build ONE doc with every number, company name, founder name, and source URL the slides will reference. Designer pulls from this; nothing gets typed twice.

    **Build kit:**
    - **Tool:** Figma (Canva Pro as fallback)
    - **Frame size:** 1080×1350 (4:5) · 12-column grid · 24px gutter · 64px outer margin
    - **Type system:** Headline 72pt / 1.1 line-height · Body 36pt / 1.4 · Caption 24pt / 1.3 (adjust to your kit)
    - **Plugins:** Iconify for icons · Unsplash plugin for stock if needed

    **Build day flow (3 hours total):**
    - 0–30 min: Wireframe all 9 slides on a single Figma page (greybox layout, no design polish)
    - 30–120 min: Visual design pass — apply colours, typography, imagery, lower-thirds
    - 120–150 min: Founder review on Figma share link, capture feedback inline
    - 150–180 min: Revisions + export

    **Post-build checklist (do in this order):**
    1. Export PNG sequence at 1080×1350, sRGB, named `slide-01.png` through `slide-09.png`
    2. Build a 5s MP4 walkthrough mock (15fps, 1080×1350) so the founder previews the full carousel as one piece
    3. Cover image: crop slide 1 to 1080×1080 for the feed grid preview
    4. Alt-text file: 1 plain-English sentence per slide for accessibility (saved as `alt.txt`)
    5. Quality gate: every slide opened on a 6.1" phone preview before sign-off — confirm headline readable in 1.5s, no body text smaller than 28pt

    **Deliverables (drop all in `/<topic-slug>/carousel/` shared folder):**
    - 8–10 PNG slides (1080×1350)
    - 1 MP4 walkthrough mock (5s)
    - 1 cover image (1080×1080)
    - 1 alt-text file
    - Figma source link (read-only)

    **Approval gate:**
    - Founder reviews wireframe at T-24h (10-min call max)
    - Founder signs off final exports T-2h before scheduled post
    - If founder unreachable T-2h: designer publishes the locked v2 (no further edits)

    ### Captions (3 drafts)

    **Long (140-180 words):**
    > <story-led primary caption with line breaks every 1-2 sentences; first line survives Instagram's "Read More" cut at ~125 chars>

    **Medium (60-90 words):**
    > <punchier, framework-led; no story setup>

    **Short (≤30 words):**
    > <pure hook + CTA>

    ### Hashtags (tiered, 5-7 total, no #)
    - **Broad (1-2):** <e.g. IndianStartups, SaaS>
    - **Niche (2-3):** <e.g. IndianSaaS, B2BSaaSIndia, BangaloreFounders>
    - **Community / branded (1):** <branded tag or FoundersOfIndia>
    - **Trend (0-1):** <only if a trending tag legitimately matches; else omit>

    ### CTAs
    - **Primary:** Save — <specific reason, e.g. "Save for your next investor deck.">
    - **Comment-driver:** <specific question, e.g. "Which mistake have you made? 1, 2, or 3?">
    - **DM-trigger:** <e.g. "DM 'CAP' for the cap-table template">
    - **Follow:** Follow for daily breakdowns of Indian early-stage playbooks.

    ### Audio
    No audio (silent IG carousel). For Story-tease repurposing: <real trending audio name + BPM + mood>.

    ### Posting Strategy
    - **Day + time (IST):** <e.g. Tue 9:00 AM IST — founders pre-stand-up>
    - **Cross-promo:** <Story tease 2-4 hours before; what the tease shows>
    - **Sequencing:** Standalone carousel.

    ### Engagement Playbook (first 60 minutes)
    - **Pinned comment (verbatim, ≤200 chars):** <framework summary + DM trigger>
    - **Prepared reply lines (3):**
      1. Agreement amplifier — <line>
      2. Gentle disagreement — <line>
      3. Follow-up question — <line>
    - **Outbound engagement (3 named accounts):** <e.g. @nithin0dha, @sajithpai, @aviralbhat>
    - **Story amplifier (30 min after feed post):** <slide concept + poll/question sticker>
    - **Follow-up post idea (tomorrow's queue):** <the natural next post extending this topic>

    ---
    ```

    **HARD RULES:**
    - Output exactly ONE brief block, the carousel.
    - **CONCEPT-LED, NOT COMPANY-LED.** The Brief title and thesis name a STARTUP CONCEPT (from the agent's Concept Menu). NEVER use a company name as the brief subject. "Razorpay's playbook" = automatic rewrite. "Capital efficiency at Series D — what Razorpay, Setu, Hasura reveal" = correct.
    - **MULTI-COMPANY DIVERSITY (enforced):** ≥ 3 DIFFERENT Indian companies illustrate the concept across the brief. NO single company appears in more than 40% of slides (e.g. ≤ 4 of 9 slides). Slides 3, 4, 5 each anchor to a DIFFERENT named company. Slide 6 synthesises all three.
    - **FRESH > FAMOUS.** Prefer Tavily-surfaced fresh names (Setu, M2P, Hasura, Capillary, Sarvam, Plivo, Rupifi, Vymo, Niro, GoKwik, Krutrim, etc.) over the famous-5 (Razorpay/Zoho/BharatPe/Cred/Freshworks). If your draft names ONLY famous-5, swap at least 2.
    - **UNCANNY-INSIGHT TEST.** Every slide teaches a non-obvious lesson — second-order, third-order, or contrarian. If the line could be inferred from the source headline alone, rewrite. "Razorpay raised ₹800 Cr" = recap, not lesson. "₹500 Cr+ Indian Series D rounds now bake in 20–30% secondary tranches — founders sell down quietly even as the round optically validates them" = lesson.
    - **Slide Blueprint uses per-slide BLOCKS, not a markdown table.** ≥ 9 slide blocks (Slide 1 Hook through Slide 9 CTA), each with all 5 labelled fields filled. NEVER output the slide blueprint as a `| pipe | table |`.
    - Every "Visual concept" is 2–3 sentences of literal content with named real specifics. Every "Design" line gives at least 1 hex colour AND 1 typography choice AND 1 layout note.
    - **URL DISCIPLINE:** Cite ONLY URLs that appear character-for-character in the upstream RankedTopic.items context. NEVER invent. NEVER reconstruct. NEVER use a homepage as stand-in. If no usable URL: omit Sources block, mark fact_check = "Evergreen". 404s destroy credibility — empty Sources beats broken Sources.
    - All 3 caption drafts complete (long 140-180w, medium 60-90w, short ≤30w).
    - ≥ 3 different named Indian companies, ≥ 2 specific ₹ amounts or percentages, ≥ 1 named framework / playbook / role per brief.
    - All 5 engagement-playbook components filled with specifics.
    - All 3 hooks + all 4 CTAs filled.
    - **Production Handoff section is mandatory and complete:** Producer's 4 next actions each have an OWNER + DEADLINE; all 7 sub-blocks filled with concrete specifics — no "TBD".
    - Zero example.com, zero placeholder names, zero motivational filler.
    - Every line passes the like-save-share test, or it gets cut.
    - Output is the markdown brief content directly — no preamble, no postamble, no JSON, no code fence wrapping the whole output.
  expected_output: |-
    A single markdown brief block (heading "## Brief #1:") for the carousel topic, ending with "---". The brief is CONCEPT-LED (title and thesis name a startup concept, not a company; companies illustrated explicitly listed at top). Contains: header strip with Concept being taught + Thesis + Companies illustrated, sources (only verbatim upstream URLs or omitted), 3 hooks with reasoning, a Slide Blueprint built as ≥9 per-slide blocks (NOT a markdown table) where Slides 3–5 each anchor to a DIFFERENT Indian company, Slide 6 synthesises across the 3, Slide 7 lands the contrarian read; every slide teaches a non-obvious lesson; ≥ 3 DIFFERENT Indian companies overall with no single company in more than 40% of slides; fresh Tavily-surfaced names preferred over famous-5. Complete Production Handoff section (4 next actions with owner+deadline, pre-prod, build kit, build day flow, post-build checklist, deliverables, approval gate). Three caption drafts (long/medium/short), tiered hashtags, 4-CTA stack, audio, posting strategy, and a 5-part engagement playbook. ≥ 2 specific numbers, ≥ 1 named framework. Zero example.com, zero placeholders, zero invented URLs.
  agent: senior_creative_director_for_instagram_b2b_content___schema_compliant
  context:
  - validate_and_rank
  - choose_format

generate_reel_part1_brief:
  description: |-
    Produce **ONE Instagram REEL brief — Part 1 (Setup)** for Indian early-stage SaaS/B2B founders. Pick the topic from the upstream `choose_format` task whose `rubric_match == "Reel — Part 1 (Setup)"`. Apply ALL rules from the agent backstory (Editorial Frame, Concept Menu, Multi-company Diversity, URL discipline).

    **EDITORIAL FRAME:** This brief is CONCEPT-LED, not COMPANY-LED. Name the startup concept being taught at the top. Illustrate it across ≥ 3 DIFFERENT Indian companies — not a single-company case study. The two-reel arc covers ONE concept progressively (Part 1 sets up the dilemma; Part 2 delivers the framework that resolves it).

    **FRESH > FAMOUS:** Prefer Tavily-surfaced fresh names (Setu, M2P, Hasura, Capillary, Sarvam, Plivo, Rupifi, Vymo, Niro, GoKwik, etc.) over the famous-5 (Razorpay / Zoho / BharatPe / Cred / Freshworks). Famous-5 only when the cluster legitimately centres on them.

    **URL DISCIPLINE:** Cite ONLY URLs that appear character-for-character in upstream RankedTopic.items context. NEVER invent, NEVER reconstruct, NEVER use a homepage as stand-in. If no usable URL: omit Sources, mark fact_check = "Evergreen". 404s kill credibility — empty Sources beats broken Sources.

    **Part 1 narrative role:** SETUP. Surface the tension, name the dilemma, plant the question. End the final shot with an explicit teaser for Part 2 ("Tomorrow: the 3 numbers that decide it.").

    **UNCANNY-INSIGHT TEST:** Every shot must teach a non-obvious lesson the founder couldn't infer from the headline alone. Avoid recap-level facts; aim for the second-order or third-order observation.

    **Story Blueprint design philosophy:** This is the centerpiece of the brief. A non-technical founder must be able to read it and visualise the reel cut by cut without asking a question. Every shot gets its own block with eight labelled fields — story beat, camera, scene, design, sticker, voiceover, emotion, transition. Specific named props, real Indian B-roll references, hex colours, lens choices, frame counts. NO single-sentence shots.

    **Output the brief using EXACTLY this markdown template (output ONLY this single brief block — no preamble, no postamble):**

    ```
    ## Brief #2: <Concept name — Part 1: Setup>

    > **Concept being taught:** <named concept from the Concept Menu — same concept Part 2 will pay off>
