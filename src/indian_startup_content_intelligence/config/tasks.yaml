    - **Emotion:** Anticipation
    - **Transition out:** End-card hold for 1.0s.

    ### Production Handoff

    **Producer's next 4 actions (do today, in order — name an owner + deadline for each):**
    1. <action + owner + deadline, e.g. "Producer: confirm wardrobe + lock coworking corner location by 6 PM IST today">
    2. <action + owner + deadline, e.g. "Producer: pull B-roll fetch list from Pexels + Razorpay press kit by 9 PM today">
    3. <action + owner + deadline, e.g. "Founder: rehearse Shot 1 + Shot 6 voiceovers tonight (out loud, recorded as voice memo)">
    4. <action + owner + deadline, e.g. "Editor: prep Premiere project with template + LUT before shoot">

    **Pre-production checklist (T-24h before publish):**
    - **Wardrobe:** <specific outfit + 1 backup, e.g. "Plain charcoal crew-neck tee, dark jeans · backup: navy henley">
    - **Location + lighting window:** <specific spot + best time, e.g. "BHIVE Indiranagar window seat · 8:30–10:00 AM IST for soft east-side light">
    - **Props (numbered):** 1) <prop + source>  2) <prop + source>  3) <prop + source>
    - **B-roll fetch list (numbered, name source for each):** 1) <e.g. "Slack notification overlay — record on personal device">  2) <e.g. "Cap-table screenshot — Carta India template">  3) <e.g. "Coworking ambient B-roll — shoot day, last 15 min">
    - **Data assets:** <e.g. "Build mock cap-table in Notion or Carta India template; populate with realistic seed-round numbers BEFORE shoot day">

    **Shoot kit:**
    - **Camera:** iPhone 15 Pro back camera · 24mm or 35mm equivalent · 4K @ 30fps · ProRes off (file size)
    - **Audio:** Rode Wireless GO II lavalier · monitored on iPhone via Filmic Pro · -12dB headroom
    - **Lighting:** Window light camera-right + 5-in-1 reflector (white side) · OR Aputure Amaran 60d at 30%, 5600K with shoot-through softbox
    - **Mount:** Manfrotto PIXI tripod at chest height · gimbal NOT required for this shot list

    **Shoot day flow (90 min total — call sheet):**
    - **0–10 min:** Frame check, sound check, 2 dry runs of full reel start-to-end
    - **10–55 min:** 6 hero shots, 3–4 takes each (45 min)
    - **55–80 min:** B-roll fetch list captured
    - **80–90 min:** Pickups + safety takes (Shot 1 hook + Shot 6 teaser are highest priority — do 2 extra takes of each)

    **Post-production checklist (deliver T-12h before publish, in this order):**
    1. Cut to 30–45s runtime · lock pacing 4–7s per shot · check Shot 1 hook lands inside first 1.5s
    2. Color: <warm cinematic LUT · +3 saturation · lift shadows 5% · skin-tone protection on>
    3. Captions burn-in: <Inter Display 800 · ink #0A0A0A on accent fill · lower-third position>; on-screen text matches each shot's sticker exactly (≤6 words)
    4. End card: 1.0s hold · "Part 2 tomorrow" highlighted in accent colour · DM trigger visible
    5. Audio mix: voiceover -16 LUFS · music ducked -12dB under VO · no clipping above -3dB
